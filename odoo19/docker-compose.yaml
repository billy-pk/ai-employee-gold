version: "3.8"
services:
  db:
    image: postgres:15
    container_name: odoo19-db
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=postgres
    volumes:
      - odoo19-db-data:/var/lib/postgresql/data
    restart: always

  odoo:
    image: odoo:19
    container_name: odoo19
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - odoo19-data:/var/lib/odoo
    restart: always

volumes:
  odoo19-db-data:
  odoo19-data:
